openapi: 3.0.3
info:
  description: HTTP-only operational endpoints for the Gas City API server. All domain
    operations use WebSocket at GET /v0/ws. Auto-generated from Go types via go generate
    ./internal/api/specgen/...
  title: Gas City HTTP API
  version: 1.0.0
servers:
- description: Default standalone API server
  url: http://localhost:8080
paths:
  /health:
    get:
      description: Returns 200 OK when the API server is running.
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                type: object
          description: OK
      summary: Health probe
  /v0/asyncapi.yaml:
    get:
      description: Returns the AsyncAPI YAML spec for the WebSocket protocol.
      responses:
        "200":
          content:
            text/yaml:
              schema:
                type: string
          description: OK
      summary: AsyncAPI specification
  /v0/city:
    post:
      description: Process manager endpoint for registering a new city directory.
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  description: Optional display name override
                  type: string
                path:
                  description: Absolute filesystem path to the city directory
                  type: string
              type: object
      responses:
        "204":
          description: No Content
      summary: Register a city with the supervisor
  /v0/openapi.yaml:
    get:
      description: Returns this OpenAPI YAML spec for the HTTP endpoints.
      responses:
        "200":
          content:
            text/yaml:
              schema:
                type: string
          description: OK
      summary: OpenAPI specification
  /v0/provider-readiness:
    get:
      description: Returns 200 when at least one AI provider is configured and reachable.
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                type: object
          description: OK
      summary: Provider readiness probe
  /v0/readiness:
    get:
      description: Returns 200 when the server is ready to accept requests.
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                type: object
          description: OK
      summary: Readiness probe
  /v0/ws:
    get:
      description: Upgrades to WebSocket. See GET /v0/asyncapi.yaml for the protocol
        documentation.
      responses:
        "204":
          description: No Content
      summary: WebSocket upgrade endpoint
