          printf 'download-worker-core-phase2-gemini=%s\n' "$GEMINI_DOWNLOAD"
          printf 'worker-core-phase2-rollup=%s\n' "$ROLLUP_STATUS"
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "changes job did not complete successfully" >&2
            exit 1
          fi
          if [ "$CHANGED" != "true" ]; then
            echo "No phase-2 worker changes detected; passing summary without fan-in."
            exit 0
          fi
          if [ "$CLAUDE_DOWNLOAD" != "success" ] || [ "$CODEX_DOWNLOAD" != "success" ] || [ "$GEMINI_DOWNLOAD" != "success" ]; then
            echo "worker-core phase-2 summary is missing one or more expected profile artifacts" >&2
            exit 1
          fi
          if [ "$ROLLUP_STATUS" != "pass" ]; then
            echo "worker-core phase-2 rollup reported a non-pass status" >&2
            exit 1
          fi
          if [ "$CLAUDE_RESULT" != "success" ] || [ "$CODEX_RESULT" != "success" ] || [ "$GEMINI_RESULT" != "success" ]; then
            echo "worker-core phase-2 matrix failed" >&2
            exit 1
          fi

  # Runs when pack-related files change — full gastown integration suite.
  pack-gate:
    name: Pack compatibility gate
    needs:
      - runner-policy
      - changes
      - check
    if: needs.changes.outputs.packs == 'true'
    runs-on: ${{ needs.runner-policy.outputs.runner_32vcpu }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-gascity-ubuntu
        with:
          dolt-version: ${{ env.DOLT_VERSION }}
          bd-version: ${{ env.BD_VERSION }}
          install-claude-cli: "true"
      - name: Install tools
        run: make install-tools
      - name: Pack compatibility tests
        run: make test-acceptance
      # The gastown pack ships via the gascity-packs Go module, so a routine
      # go.mod bump can silently desync the embedded pack bytes from the
      # provenance pins in internal/config/public_packs.go and the
      # examples/gastown import. This check fails when any pin drifts from
      # the latest registry release; every in-repo test stays green after
      # such a drift, so this is the only automated guard.
      - name: Bundled gastown pack pin check
        timeout-minutes: 10
        run: |
          for attempt in 1 2 3; do
            if scripts/update-bundled-gastown-pack --check; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
      - name: Live registry smoke
        timeout-minutes: 12
        run: |
          for attempt in 1 2 3; do
            if make test-pack-registry-live; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
        env:
          GC_TEST_GASCITY_PACKS_REGISTRY: main
    env:
      DOLT_VERSION: "2.1.7"
      BD_VERSION: "v1.1.0"

  # Dashboard SPA typecheck + tests + build. Runs on every push/PR
  # so TS drift against the spec (e.g. a query param tightening from
  # string to boolean) fails CI instead of shipping as a silent
  # runtime bug. Vite's build transpiles TS to JS and does not fail
  # on type errors; `tsc --noEmit` via `npm run typecheck` is the
  # load-bearing discipline step.
  dashboard:
    name: Dashboard SPA
    needs:
      - runner-policy
    runs-on: ${{ needs.runner-policy.outputs.runner_16vcpu }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install SPA dependencies
        run: npm ci --silent
        working-directory: internal/api/dashboardspa/web
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
        working-directory: internal/api/dashboardspa/web
      - name: Vitest
        run: npm run --workspace gas-city-dashboard-frontend test
        working-directory: internal/api/dashboardspa/web
      - name: Build
        run: npm run build --silent
        working-directory: internal/api/dashboardspa/web

  # openclaw-bridge Node test suite. The bridge ships its own npm tests
  # (inbound at-least-once redelivery + gc client wire shapes); without this
  # gate, regressions under contrib/openclaw-bridge/** could merge because the
  # only other npm job runs in internal/api/dashboardspa/web. Path-gated, so non-bridge
  # PRs skip it (and ci-required allows the skip).
  openclaw-bridge:
    name: openclaw-bridge Node tests
    needs:
      - runner-policy
      - changes
    if: needs.changes.outputs.openclaw_bridge == 'true'
    runs-on: ${{ needs.runner-policy.outputs.runner_2vcpu }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install and test
        run: npm ci --no-audit --no-fund && npm test
        working-directory: contrib/openclaw-bridge

  # Runs when mail-related source paths change.
  mcp-mail:
    name: MCP mail conformance
    needs:
      - runner-policy
      - changes
    if: needs.changes.outputs.mail == 'true'
    runs-on: ${{ needs.runner-policy.outputs.runner_8vcpu }}
    continue-on-error: true  # upstream mcp_agent_mail API may drift
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install mcp_agent_mail
        run: python -m pip install --no-deps --require-hashes -r .github/requirements/mcp-agent-mail.txt

      - name: MCP mail conformance test
        run: make test-mcp-mail

  # Runs when session/Docker-related source paths change.
  docker-session:
    name: Docker session
    needs:
      - runner-policy
      - changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ${{ needs.runner-policy.outputs.runner_16vcpu }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install tools
        run: make install-tools

      - name: Docker session tests
        run: make test-docker

  # Runs when session/K8s-related source paths change.
  # Requires K8s CI infrastructure — no-op until secrets are configured.
  k8s-session:
    name: K8s session
    needs:
      - runner-policy
      - changes
    if: needs.changes.outputs.k8s == 'true'
    runs-on: ${{ needs.runner-policy.outputs.runner_8vcpu }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: K8s session tests
        if: env.GC_K8S_AVAILABLE == 'true'
        env:
          GC_K8S_AVAILABLE: ${{ secrets.GC_K8S_AVAILABLE }}
        run: make test-k8s

  ci-preflight:
    name: CI / preflight
    needs:
      - runner-policy
      - check
      - release-config
      - dashboard
    if: ${{ always() }}
    runs-on: ${{ needs.runner-policy.outputs.runner_2vcpu }}
    env:
      NEEDS_JSON: ${{ toJSON(needs) }}
    steps:
      - name: Summarize preflight gates
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              job: meta.get("result", "unknown")
              for job, meta in sorted(needs.items())
              if meta.get("result") != "success"
          }
          if failed:
              for job, result in failed.items():
                  print(f"{job}: {result}", file=sys.stderr)
              sys.exit(1)
          PY

  ci-integration:
    name: CI / integration
    needs:
      - runner-policy
      - integration-shards
    if: ${{ always() }}
    runs-on: ${{ needs.runner-policy.outputs.runner_2vcpu }}
    env:
      NEEDS_JSON: ${{ toJSON(needs) }}
    steps:
      - name: Summarize integration gates
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          # integration-shards is gated on path filters; a "skipped" result
          # means the change didn't touch any Go code or shard scripts, which
          # is the expected pass case for docs-only PRs.
          allow_skipped = {"integration-shards"}
          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {}
          for job, meta in sorted(needs.items()):
              result = meta.get("result", "unknown")
              if result == "success":
                  continue
              if result == "skipped" and job in allow_skipped:
                  continue
              failed[job] = result
          if failed:
              for job, result in failed.items():
                  print(f"{job}: {result}", file=sys.stderr)
              sys.exit(1)
          PY

  ci-required:
    name: CI / required
    needs:
      - runner-policy
      - changes
      - ci-preflight
      - ci-integration
      - cmd-gc-process
      - worker-core-summary
      - worker-core-phase2-summary
      - pack-gate
      - docker-session
      - k8s-session
      - openclaw-bridge
    if: ${{ always() }}
    runs-on: ${{ needs.runner-policy.outputs.runner_2vcpu }}
    env:
      NEEDS_JSON: ${{ toJSON(needs) }}
    steps:
      - name: Summarize required gates
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          allow_skipped = {
              "cmd-gc-process",
              "pack-gate",
              "docker-session",
              "k8s-session",
              "openclaw-bridge",
          }
          failed = {}
          for job, meta in sorted(needs.items()):
              result = meta.get("result", "unknown")
              if result == "success":
                  continue
              if result == "skipped" and job in allow_skipped:
                  continue
              failed[job] = result

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as handle:
              handle.write("## CI Required\n\n")
              handle.write("| Job | Result |\n| --- | --- |\n")
              for job, meta in sorted(needs.items()):
                  handle.write(f"| {job} | {meta.get('result', 'unknown')} |\n")

          if failed:
              for job, result in failed.items():
                  print(f"{job}: {result}", file=sys.stderr)
              sys.exit(1)
          PY
