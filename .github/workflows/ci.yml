name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Detect which paths changed to gate conditional jobs.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      mail: ${{ steps.filter.outputs.mail }}
      docker: ${{ steps.filter.outputs.docker }}
      k8s: ${{ steps.filter.outputs.k8s }}
      beads: ${{ steps.filter.outputs.beads }}
      packs: ${{ steps.filter.outputs.packs }}
      worker: ${{ steps.filter.outputs.worker }}
      worker_phase2: ${{ steps.filter.outputs.worker_phase2 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            mail:
              - 'internal/mail/**'
              - 'contrib/mail-scripts/**'
            docker:
              - 'internal/session/**'
              - 'scripts/gc-session-docker'
              - 'scripts/test-docker-session'
              - 'contrib/session-scripts/**'
            k8s:
              - 'internal/session/**'
              - 'contrib/session-scripts/gc-session-k8s*'
              - 'test/integration/session_k8s_test.go'
            beads:
              - 'go.mod'
              - 'internal/beads/**'
            packs:
              - 'examples/gastown/packs/**'
              - 'internal/config/pack.go'
              - 'internal/config/compose.go'
              - 'cmd/gc/embed_builtin_packs.go'
            worker:
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/**'
              - 'Makefile'
              - 'internal/worker/**'
              - 'internal/sessionlog/**'
              - 'internal/runtime/**'
              - 'internal/config/**'
              - 'cmd/gc/template_resolve*.go'
              - 'cmd/gc/session_*'
              - 'test/**worker**'
            worker_phase2:
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/**'
              - 'Makefile'
              - 'internal/worker/**'
              - 'internal/sessionlog/**'
              - 'internal/runtime/**'

  # Always runs: lint, fmt, vet, unit tests, integration tests, coverage.
  check:
    name: Check
    runs-on: ubuntu-latest
    env:
      # Pinned dependency versions — keep in sync with deps.env.
      DOLT_VERSION: "1.85.0"
      BD_COMMIT: "9d9d0e53c2330bd081bef350883f56c2557eb78b"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: gastownhall/beads
          ref: ${{ env.BD_COMMIT }}
          path: .beads-src

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          # The pinned beads fork commit requires Go 1.25.8.
          go-version: "1.25.8"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux jq

      - name: Install dolt v${{ env.DOLT_VERSION }}
        run: |
          curl -fsSL https://github.com/dolthub/dolt/releases/download/v${{ env.DOLT_VERSION }}/install.sh | sudo bash
          dolt version

      - name: Build pinned beads (bd) from gastownhall/beads@${{ env.BD_COMMIT }}
        working-directory: .beads-src
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.bd-release"
          GOBIN="$GITHUB_WORKSPACE/.bd-release" go install ./cmd/bd
          sudo install -m 0755 "$GITHUB_WORKSPACE/.bd-release/bd" /usr/local/bin/bd
          bd version

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install tools
        run: make install-tools

      - name: Lint
        run: make lint

      - name: Format
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Test
        run: make test-cover

      - name: Docs
        run: make check-docs

      - name: Acceptance tests (Tier A)
        run: make test-acceptance

      - name: Integration tests
        continue-on-error: true  # requires provider binaries (claude/codex) not available in CI
        run: make test-integration

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  worker-core-claude:
    name: Worker core (Claude)
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
      - name: WorkerCore transcript/continuation conformance
        run: make test-worker-core PROFILE='claude/tmux-cli'

  worker-core-codex:
    name: Worker core (Codex)
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
      - name: WorkerCore transcript/continuation conformance
        run: make test-worker-core PROFILE='codex/tmux-cli'

  worker-core-gemini:
    name: Worker core (Gemini)
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
      - name: WorkerCore transcript/continuation conformance
        run: make test-worker-core PROFILE='gemini/tmux-cli'

  worker-core-summary:
    name: Worker core summary
    needs:
      - changes
      - worker-core-claude
      - worker-core-codex
      - worker-core-gemini
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Assert worker-core profile matrix passed
        run: |
          CHANGES_RESULT='${{ needs.changes.result }}'
          CHANGED='${{ needs.changes.outputs.worker }}'
          CLAUDE_RESULT='${{ needs.worker-core-claude.result }}'
          CODEX_RESULT='${{ needs.worker-core-codex.result }}'
          GEMINI_RESULT='${{ needs.worker-core-gemini.result }}'
          printf 'changes-result=%s\n' "$CHANGES_RESULT"
          printf 'worker-changes=%s\n' "$CHANGED"
          printf 'worker-core-claude=%s\n' "$CLAUDE_RESULT"
          printf 'worker-core-codex=%s\n' "$CODEX_RESULT"
          printf 'worker-core-gemini=%s\n' "$GEMINI_RESULT"
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "changes job did not complete successfully" >&2
            exit 1
          fi
          if [ "$CHANGED" != "true" ]; then
            echo "No worker changes detected; passing summary without fan-in."
            exit 0
          fi
          if [ "$CLAUDE_RESULT" != "success" ] || [ "$CODEX_RESULT" != "success" ] || [ "$GEMINI_RESULT" != "success" ]; then
            echo "worker-core matrix failed" >&2
            exit 1
          fi

  worker-core-phase2-claude:
    name: Worker core phase 2 (Claude)
    needs: changes
    if: needs.changes.outputs.worker_phase2 == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
      - name: WorkerCore phase-2 conformance
        run: make test-worker-core-phase2 PROFILE='claude/tmux-cli'

  worker-core-phase2-codex:
    name: Worker core phase 2 (Codex)
    needs: changes
    if: needs.changes.outputs.worker_phase2 == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
      - name: WorkerCore phase-2 conformance
        run: make test-worker-core-phase2 PROFILE='codex/tmux-cli'

  worker-core-phase2-gemini:
    name: Worker core phase 2 (Gemini)
    needs: changes
    if: needs.changes.outputs.worker_phase2 == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
      - name: WorkerCore phase-2 conformance
        run: make test-worker-core-phase2 PROFILE='gemini/tmux-cli'

  worker-core-phase2-summary:
    name: Worker core phase 2 summary
    needs:
      - changes
      - worker-core-phase2-claude
      - worker-core-phase2-codex
      - worker-core-phase2-gemini
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Assert worker-core phase-2 matrix passed
        run: |
          CHANGES_RESULT='${{ needs.changes.result }}'
          CHANGED='${{ needs.changes.outputs.worker_phase2 }}'
          CLAUDE_RESULT='${{ needs.worker-core-phase2-claude.result }}'
          CODEX_RESULT='${{ needs.worker-core-phase2-codex.result }}'
          GEMINI_RESULT='${{ needs.worker-core-phase2-gemini.result }}'
          printf 'changes-result=%s\n' "$CHANGES_RESULT"
          printf 'worker-phase2-changes=%s\n' "$CHANGED"
          printf 'worker-core-phase2-claude=%s\n' "$CLAUDE_RESULT"
          printf 'worker-core-phase2-codex=%s\n' "$CODEX_RESULT"
          printf 'worker-core-phase2-gemini=%s\n' "$GEMINI_RESULT"
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "changes job did not complete successfully" >&2
            exit 1
          fi
          if [ "$CHANGED" != "true" ]; then
            echo "No phase-2 worker changes detected; passing summary without fan-in."
            exit 0
          fi
          if [ "$CLAUDE_RESULT" != "success" ] || [ "$CODEX_RESULT" != "success" ] || [ "$GEMINI_RESULT" != "success" ]; then
            echo "worker-core phase-2 matrix failed" >&2
            exit 1
          fi

  worker-core-phase3-claude:
    name: Worker core phase 3 (Claude)
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
      - name: WorkerCore phase-3 conformance
        run: make test-worker-core-phase3 PROFILE='claude/tmux-cli'

  worker-core-phase3-codex:
    name: Worker core phase 3 (Codex)
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
      - name: WorkerCore phase-3 conformance
        run: make test-worker-core-phase3 PROFILE='codex/tmux-cli'

  worker-core-phase3-gemini:
    name: Worker core phase 3 (Gemini)
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
      - name: WorkerCore phase-3 conformance
        run: make test-worker-core-phase3 PROFILE='gemini/tmux-cli'

  worker-core-phase3-summary:
    name: Worker core phase 3 summary
    needs:
      - changes
      - worker-core-phase3-claude
      - worker-core-phase3-codex
      - worker-core-phase3-gemini
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Assert worker-core phase-3 matrix passed
        run: |
          CHANGES_RESULT='${{ needs.changes.result }}'
          CHANGED='${{ needs.changes.outputs.worker }}'
          CLAUDE_RESULT='${{ needs.worker-core-phase3-claude.result }}'
          CODEX_RESULT='${{ needs.worker-core-phase3-codex.result }}'
          GEMINI_RESULT='${{ needs.worker-core-phase3-gemini.result }}'
          printf 'changes-result=%s\n' "$CHANGES_RESULT"
          printf 'worker-changes=%s\n' "$CHANGED"
          printf 'worker-core-phase3-claude=%s\n' "$CLAUDE_RESULT"
          printf 'worker-core-phase3-codex=%s\n' "$CODEX_RESULT"
          printf 'worker-core-phase3-gemini=%s\n' "$GEMINI_RESULT"
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "changes job did not complete successfully" >&2
            exit 1
          fi
          if [ "$CHANGED" != "true" ]; then
            echo "No phase-3 worker changes detected; passing summary without fan-in."
            exit 0
          fi
          if [ "$CLAUDE_RESULT" != "success" ] || [ "$CODEX_RESULT" != "success" ] || [ "$GEMINI_RESULT" != "success" ]; then
            echo "worker-core phase-3 matrix failed" >&2
            exit 1
          fi

  # Runs when pack-related files change — full gastown integration suite.
  pack-gate:
    name: Pack compatibility gate
    needs: [changes, check]
    if: needs.changes.outputs.packs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: gastownhall/beads
          ref: ${{ env.BD_COMMIT }}
          path: .beads-src
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.25.8"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux jq
      - name: Install dolt
        run: |
          curl -fsSL https://github.com/dolthub/dolt/releases/download/v${{ env.DOLT_VERSION }}/install.sh | sudo bash
      - name: Build bd
        working-directory: .beads-src
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.bd-release"
          GOBIN="$GITHUB_WORKSPACE/.bd-release" go install ./cmd/bd
          sudo install -m 0755 "$GITHUB_WORKSPACE/.bd-release/bd" /usr/local/bin/bd
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Install tools
        run: make install-tools
      - name: Pack compatibility tests
        run: make test-acceptance
    env:
      DOLT_VERSION: "1.85.0"
      BD_COMMIT: "9d9d0e53c2330bd081bef350883f56c2557eb78b"

  # Runs when mail-related source paths change.
  mcp-mail:
    name: MCP mail conformance
    needs: changes
    if: needs.changes.outputs.mail == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true  # upstream mcp_agent_mail API may drift
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install mcp_agent_mail
        run: pip install 'mcp-agent-mail==0.1.0'

      - name: MCP mail conformance test
        run: make test-mcp-mail

  # Runs when session/Docker-related source paths change.
  docker-session:
    name: Docker session
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install tools
        run: make install-tools

      - name: Docker session tests
        run: make test-docker

  # Runs when session/K8s-related source paths change.
  # Requires K8s CI infrastructure — no-op until secrets are configured.
  k8s-session:
    name: K8s session
    needs: changes
    if: needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: K8s session tests
        if: env.GC_K8S_AVAILABLE == 'true'
        env:
          GC_K8S_AVAILABLE: ${{ secrets.GC_K8S_AVAILABLE }}
        run: make test-k8s
