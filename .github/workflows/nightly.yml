name: Nightly

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  DOLT_VERSION: "2.1.7"
  BD_VERSION: "v1.0.4"

jobs:
  tier-b:
    name: Tier B acceptance tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-gascity-ubuntu
        with:
          dolt-version: ${{ env.DOLT_VERSION }}
          bd-version: ${{ env.BD_VERSION }}
          install-claude-cli: "false"

      - name: Tier B lifecycle tests
        env:
          ACCEPTANCE_B_TIMEOUT: 20m
          EXTRA_TEST_ENV: >-
            GC_IDLE_BEAD_STABILITY_WARMUP=10s
            GC_IDLE_BEAD_STABILITY_SAMPLES=36
            GC_IDLE_BEAD_STABILITY_INTERVAL=5s
        run: make test-acceptance-b

  tier-c:
    name: Tier C acceptance tests (Ollama)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ANTHROPIC_BASE_URL: https://ollama.com
      ANTHROPIC_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.OLLAMA_API_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.GC_WORKER_INFERENCE_CLAUDE_OLLAMA_HAIKU_MODEL }}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.GC_WORKER_INFERENCE_CLAUDE_OLLAMA_SONNET_MODEL }}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ vars.GC_WORKER_INFERENCE_CLAUDE_OLLAMA_OPUS_MODEL }}
      CLAUDE_CODE_SUBAGENT_MODEL: ${{ vars.GC_WORKER_INFERENCE_CLAUDE_OLLAMA_SUBAGENT_MODEL }}
      CLAUDE_CODE_EFFORT_LEVEL: auto
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-gascity-ubuntu
        with:
          dolt-version: ${{ env.DOLT_VERSION }}
          bd-version: ${{ env.BD_VERSION }}
          install-claude-cli: "true"

      - name: Validate Ollama Claude configuration
        run: |
          test -n "$OLLAMA_API_KEY" || { echo "Missing OLLAMA_API_KEY GitHub secret" >&2; exit 1; }
          test -n "$ANTHROPIC_API_KEY" || { echo "ANTHROPIC_API_KEY resolved empty" >&2; exit 1; }
          test -n "$ANTHROPIC_AUTH_TOKEN" || { echo "ANTHROPIC_AUTH_TOKEN resolved empty" >&2; exit 1; }
          test -n "$ANTHROPIC_DEFAULT_HAIKU_MODEL" || { echo "ANTHROPIC_DEFAULT_HAIKU_MODEL resolved empty" >&2; exit 1; }
          test -n "$ANTHROPIC_DEFAULT_SONNET_MODEL" || { echo "ANTHROPIC_DEFAULT_SONNET_MODEL resolved empty" >&2; exit 1; }
          test -n "$ANTHROPIC_DEFAULT_OPUS_MODEL" || { echo "ANTHROPIC_DEFAULT_OPUS_MODEL resolved empty" >&2; exit 1; }
          test -n "$CLAUDE_CODE_SUBAGENT_MODEL" || { echo "CLAUDE_CODE_SUBAGENT_MODEL resolved empty" >&2; exit 1; }
          printf 'ANTHROPIC_BASE_URL=%s\n' "$ANTHROPIC_BASE_URL"
          printf 'ANTHROPIC_DEFAULT_HAIKU_MODEL=%s\n' "$ANTHROPIC_DEFAULT_HAIKU_MODEL"
          printf 'ANTHROPIC_DEFAULT_SONNET_MODEL=%s\n' "$ANTHROPIC_DEFAULT_SONNET_MODEL"
          printf 'ANTHROPIC_DEFAULT_OPUS_MODEL=%s\n' "$ANTHROPIC_DEFAULT_OPUS_MODEL"
          printf 'CLAUDE_CODE_SUBAGENT_MODEL=%s\n' "$CLAUDE_CODE_SUBAGENT_MODEL"

      - name: Tier C Ollama inference tests
        run: >
          go test -tags acceptance_c -timeout 45m -v ./test/acceptance/tier_c/...
          -run 'Test(BdCmdSeparatesStdoutAndStderrOnError|BdCmdReturnsPureStdoutOnSuccessfulJSONCommand|Swarm_SlingWorkCoderCommits|Gastown_PolecatLifecycle|Gastown_MayorDispatchPipeline|TierCEnvAuthDoesNotMirrorAuthTokenIntoAPIKey)$'

  integration-sqlite-coordstore:
    name: Integration / SQLite coordination store
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOLT_VERSION: "2.1.7"
      BD_VERSION: "v1.0.4"
      GC_BEADS: sqlite
      GC_ACCEPTANCE_BEADS_PROVIDER: sqlite
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-gascity-ubuntu
        with:
          dolt-version: ${{ env.DOLT_VERSION }}
          bd-version: ${{ env.BD_VERSION }}
          install-claude-cli: "true"
      - name: Install tools
        run: make install-tools
      - name: Integration tests (SQLite coordination store)
        run: make test-integration-bdstore
      - name: Acceptance tests (SQLite coordination store, Tier A)
        run: make test-acceptance

  # Catches registry-side drift: a new gastown release published to
  # gascity-packs makes the local pins stale without any PR to trigger
  # the pack-gate pin check in ci.yml.
  bundled-pack-pins:
    name: Bundled gastown pack pin check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Verify bundled gastown pins match the registry
        run: |
          for attempt in 1 2 3; do
            if scripts/update-bundled-gastown-pack --check; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
