# Gas Town — domain-specific coding workflow pack.
#
# Gastown roles: mayor (coordinator), deacon (patrol), boot (watchdog),
# dog (utility recovery), plus rig-scoped agents (witness, refinery, polecat).
# This pack owns its dog pool and the mol-shutdown-dance formula outright.
# Mechanical housekeeping (gate/orphan/wisp sweeps, branch pruning, nudge
# relays, JSONL export, Dolt checks) ships with the Gas City builtin core
# pack, which cities include explicitly in city.toml (gc init writes the
# include; gc doctor --fix repairs it). The retired maintenance pack no
# longer exists, and cross-pack agent name collisions are hard errors, so
# no fallback or composition-ordering dance is needed.
#
# Referenced by both workspace.pack and rigs[].pack:
#   workspace.pack → expands city-scoped agents only (mayor, deacon, boot, dog)
#   rigs[].pack    → expands rig agents only (witness, refinery, polecat)
#
# Crew members are individually named and declared inline in city.toml.

[pack]
name = "gastown"
schema = 2

[global]
session_live = [
    "{{.ConfigDir}}/assets/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}",
    "{{.ConfigDir}}/assets/scripts/tmux-keybindings.sh {{.ConfigDir}}",
]

[[named_session]]
template = "mayor"
scope = "city"
mode = "always"

[[named_session]]
template = "deacon"
scope = "city"
mode = "always"

# Boot is woken on demand by the boot-gate exec order (orders/boot-gate.toml),
# which files a wake bead assigned to boot only when the deacon's patrol wisp
# goes stale. mode = "always" would revive boot every patrol tick and write a
# session bead each time — the dominant source of city-store churn on an idle
# town. on_demand keeps boot dormant until there is something to judge.
[[named_session]]
template = "boot"
scope = "city"
mode = "on_demand"

[[named_session]]
template = "witness"
scope = "rig"
mode = "always"

[[named_session]]
template = "refinery"
scope = "rig"
mode = "on_demand"
