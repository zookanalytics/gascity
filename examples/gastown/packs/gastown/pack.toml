# Gas Town — domain-specific coding workflow pack.
#
# Gastown roles: mayor (coordinator), deacon (patrol), boot (watchdog),
# plus rig-scoped agents (witness, refinery, polecat).
# Dog (utility pool) is defined here with tmux theming; maintenance provides
# the fallback (unthemed) dog. Mechanical housekeeping lives in maintenance.
#
# Referenced by both workspace.pack and rigs[].pack:
#   workspace.pack → expands city-scoped agents only (mayor, deacon, boot)
#   rigs[].pack    → expands rig agents only (witness, refinery, polecat)
#
# Crew members are individually named directory agents (agents/<name>/) plus a
# named session; see the worked example in examples/gastown/city.toml.

[pack]
name = "gastown"
schema = 2

[imports.maintenance]
source = "../maintenance"

[global]
session_live = [
    "{{.ConfigDir}}/assets/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}",
    "{{.ConfigDir}}/assets/scripts/tmux-keybindings.sh {{.ConfigDir}}",
]

[[patches.agent]]
name = "dog"
wake_mode = "fresh"
work_dir = ".gc/agents/dogs/{{.AgentBase}}"

[[named_session]]
template = "mayor"
scope = "city"
mode = "always"

[[named_session]]
template = "deacon"
scope = "city"
mode = "always"

# Boot is woken on demand by the boot-gate exec order (orders/boot-gate.toml),
# which files a wake bead assigned to boot only when the deacon's patrol wisp
# goes stale. mode = "always" would revive boot every patrol tick and write a
# session bead each time — the dominant source of city-store churn on an idle
# town. on_demand keeps boot dormant until there is something to judge.
[[named_session]]
template = "boot"
scope = "city"
mode = "on_demand"

[[named_session]]
template = "witness"
scope = "rig"
mode = "always"

[[named_session]]
template = "refinery"
scope = "rig"
mode = "on_demand"
