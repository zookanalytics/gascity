description = """
Detect stale and test databases accumulating in the Dolt server.

Stale databases are orphaned test databases (testdb_*, beads_t*, beads_pt*,
doctest_*, doctortest_*, beads_vr*) that accumulate on the production Dolt
server when tests leak or cleanup fails. These consume disk space, degrade
server performance, and inflate SHOW DATABASES output.

This formula adds continuous monitoring: detect orphan accumulation before
it reaches crisis levels.

## Dog Contract

This is infrastructure work. You:
1. Query SHOW DATABASES and identify stale/test databases
2. Count and classify orphans
3. Clean up if count is manageable, escalate if excessive
4. Report findings and exit
5. Return to kennel

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| port | config | Dolt server port (default 3307) |
| max_orphans_for_sql | config | Max orphans for SQL-based cleanup (default 50) |
| warn_threshold | config | Orphan count to trigger warning (default 5) |

## Safety

Only removes databases matching known test/orphan patterns. Production databases
are identified by rig registry via gc rig list --json and are never touched.
External rigs are supported (not subject to local glob limitations).

Read each step's description before acting — Config values override defaults."""
formula = "mol-dog-stale-db"
version = 1

[vars]
[vars.port]
description = "Dolt server port"
default = "3307"

[vars.max_orphans_for_sql]
description = "Maximum orphan count for SQL-based cleanup (above this, escalate instead)"
default = "50"

[vars.warn_threshold]
description = "Orphan count that triggers a warning"
default = "5"

[[steps]]
id = "scan"
title = "Scan for stale and test databases"
description = """
Query the Dolt server and identify orphaned databases.

**1. Query SHOW DATABASES:**
```sql
SHOW DATABASES;
```
Filter out Dolt internals (information_schema, mysql, dolt_cluster,
__gc_probe).

**2. Classify each database:**

Known test/orphan patterns:
- `testdb_*` — test harness databases
- `beads_t*` — beads test databases
- `beads_pt*` — beads patrol test databases
- `beads_vr*` — beads version test databases
- `doctest_*` — documentation test databases
- `doctortest_*` — doctor test databases

Production databases are those referenced by any rig's metadata.

**3. Record findings:**
- Total database count
- Production database count and names
- Orphan database count and names
- Orphan total size (check filesystem)

**Exit criteria:** All databases classified."""

[[steps]]
id = "cleanup"
title = "Clean up orphan databases"
needs = ["scan"]
description = """
Remove orphan databases if count is manageable.

**1. If no orphans found:**
Skip — nothing to clean.

**2. If orphan count <= {{max_orphans_for_sql}}:**
Clean up via SQL:
```sql
DROP DATABASE IF EXISTS `<orphan_name>`;
```

**3. If orphan count > {{max_orphans_for_sql}}:**
SQL cleanup would take too long via this loop. Delegate to gc dolt cleanup,
which itself routes through the running server's `DROP DATABASE` (safe under
the server's NBS lock):
```bash
gc dolt cleanup --force --max <count>
```
If `gc dolt cleanup` returns ANY refusal (server unreachable, port reachable
but `SELECT 1` failed, or cannot probe TCP), STOP. Do NOT retry with
`--server-down-ok` from any agent context, including this formula. The
flag is a TTY-only operator gesture; if you are an agent, you are not the
operator, regardless of who scheduled you. Escalate immediately. Only a
human operator may use `--server-down-ok`, and only after independently
verifying the dolt server process is stopped AND the port is closed —
running rm -rf against a live data dir corrupts NBS state and crash-loops
the journal (#1549).
```bash
gc mail send mayor/ -s "ESCALATION: <count> orphan databases detected, dolt unreachable [HIGH]" \\
  -m "Too many orphans for inline SQL cleanup AND gc dolt cleanup refused (server unreachable). Operator must confirm dolt is stopped (process gone AND port closed), then re-run with --server-down-ok."
```

**4. Record results:**
- Orphans removed (count)
- Orphans remaining (count)
- Any errors during cleanup

**Exit criteria:** Orphans cleaned (or escalated if too many)."""

[[steps]]
id = "report"
title = "Report findings and return to kennel"
needs = ["cleanup"]
description = """
Generate summary and signal completion.

**1. Generate report summary:**
- Total databases
- Production databases
- Orphan databases found
- Orphans removed
- Orphans remaining

**2. Warn if above threshold:**
If orphan count >= {{warn_threshold}}:
```bash
gc nudge deacon/ "WARN: <count> orphan databases detected"
```

**3. Signal completion:**
```bash
gc nudge deacon/ "DOG_DONE: stale-db — orphans: <count>, removed: <count>"
```

**4. Close work and exit:**
```bash
gc bd close <work-bead> --reason "Stale DB scan complete"
gc runtime drain-ack
exit
```

**Exit criteria:** Report sent, dog returned to kennel."""
