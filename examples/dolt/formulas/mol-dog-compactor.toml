description = """
Compact Dolt commit history on production databases.

Every bd mutation creates a Dolt commit. Over time, this builds an enormous
commit graph (5,000-10,000 commits/day from wisp churn). The commit graph IS
the storage cost — deleting rows without compaction leaves ghost commits forever.

The Compactor Dog periodically compacts each database's history. Two modes:

**Flatten mode** (default): Soft-resets to root commit on main, then commits all
data as a single commit. Safe with concurrent writes — merge base shifts but
diff is just the txn.

**Surgical mode**: Interactive rebase that squashes old commits while preserving
the most recent N as individual picks. NOT safe with concurrent writes — Dolt
detects graph changes and returns an error. Retries once on collision.

## ZFC Exemption

This formula is used for **observability tracking only** — the compactor daemon
code is the executor. The compactor is exempt from agent-driven formula
execution (ZFC) because:

1. Operations require SQL connections via database/sql (agents lack SQL access)
2. Transactional state spans multiple queries (pre-flight counts, HEAD hashes)
3. Branch creation/deletion requires cleanup-on-failure error paths
4. Concurrent write retry needs error classification
5. Integrity verification compares row counts before/after compaction

The daemon pours this molecule, executes the compaction, and closes/fails each
step for observability. This IS the hybrid approach: formula defines observable
structure, imperative code is the executor.

## Dog Contract

This is infrastructure work. The daemon:
1. Inspects all production databases for commit count
2. Compacts databases exceeding the threshold (flatten or surgical)
3. Verifies data integrity after compaction
4. Runs dolt_gc to reclaim unreferenced chunks
5. Reports findings

## Order of Operations

Reaper (deletes rows) -> Compactor (flattens history) -> Doctor (runs gc)

## Safety

Flatten: irreversible — all commit history replaced by single commit. Data
preserved (all rows intact), only the commit graph changes. Concurrent writes
are safe (merge base shifts but data is preserved).

Surgical: reversible via rebase abort. Preserves recent commit history.
NOT safe with concurrent writes — retries once on graph-change errors.

JSONL backups and Dolt filesystem backups provide recovery points.

Read each step's description before acting — Config values override defaults."""
formula = "mol-dog-compactor"
version = 2

[vars]
[vars.commit_threshold]
description = "Minimum commit count before compaction triggers (default 500)"
default = "500"

[vars.databases]
description = "Comma-separated list of databases to compact (empty = auto-discover)"
default = ""

[vars.mode]
description = "Compaction strategy: 'flatten' (default) or 'surgical'"
default = "flatten"

[vars.keep_recent]
description = "Number of recent commits to preserve in surgical mode (default 50)"
default = "50"

[[steps]]
id = "inspect"
title = "Inspect databases for commit count"
description = """
Check each production database's commit count against the threshold.

**Database discovery:** Use configured database list from {{databases}}, or
auto-discover from Dolt server.

**For each database:**
```sql
SELECT COUNT(*) FROM (SELECT 1 FROM dolt_log LIMIT 10000) AS t;
```

**Record:**
- Database name
- Current commit count
- Whether it exceeds threshold (default {{commit_threshold}})

**Exit criteria:** All databases inspected, candidates identified."""

[[steps]]
id = "compact"
title = "Compact databases exceeding threshold"
needs = ["inspect"]
description = """
Compact commit history on databases above the commit threshold.
Mode is configurable: "flatten" (default) or "surgical".

**Flatten mode algorithm (per database):**
1. Record pre-flight row counts for all user tables (integrity baseline)
2. Find root (earliest) commit hash
3. USE database for session-scoped operations
4. Soft-reset to root: `CALL DOLT_RESET('--soft', '<root>')` — moves parent
   pointer, keeps all data staged
5. Commit all data: `CALL DOLT_COMMIT('-Am', 'compaction: flatten history')`
6. Verify row counts match pre-flight (integrity check)
7. Verify final commit count

Concurrent writes are safe — merge base shifts but diff is just the txn.

**Surgical mode algorithm (per database):**
1. Record pre-flight state (HEAD hash, row counts)
2. Find root commit hash
3. Clean up leftover compact-base/compact-work branches
4. Create anchor branch at root: `CALL DOLT_BRANCH('compact-base', '<root>')`
5. Create work branch from main: `CALL DOLT_BRANCH('compact-work', 'main')`
6. Checkout work branch
7. Start interactive rebase: `CALL DOLT_REBASE('--interactive', 'compact-base')`
8. Read rebase plan bounds, mark old commits as squash (keep recent {{keep_recent}})
9. Execute rebase: `CALL DOLT_REBASE('--continue')`
10. Verify row counts match pre-flight
11. Verify HEAD hasn't moved (concurrency check)
12. Swap branches: delete main, rename compact-work to main
13. Clean up compact-base branch

Concurrent write hazard: DOLT_REBASE fails if graph changes during execution.
Retries once with 2s pause between attempts.

**Post-compaction:** Runs `CALL dolt_gc()` to reclaim unreferenced chunks.

**Exit criteria:** All candidate databases compacted or safely skipped."""

[[steps]]
id = "verify"
title = "Verify data integrity"
needs = ["compact"]
description = """
Integrity verification is performed inline during compaction (row count
comparison before/after). This step tracks the overall verification status
across all databases.

**Verification performed per database during compact step:**
- Pre-flight: record row counts for all user tables (excluding dolt_* system tables)
- Post-compaction: re-count all tables, compare against pre-flight
- Any mismatch -> compaction error, database left in pre-compaction state

If any check fails, escalate:
```bash
gc mail send mayor/ -s "ESCALATION: Compaction integrity check failed [CRITICAL]" \
  -m "Database: <db>, table: <table>, expected: <n>, got: <m>"
```

**Exit criteria:** All compacted databases passed integrity checks."""

[[steps]]
id = "report"
title = "Report findings and return to kennel"
needs = ["verify"]
description = """
Generate summary of compaction cycle.

**1. Generate report summary:**
- Databases inspected (total count)
- Databases compacted (with before/after commit counts)
- Databases skipped (below threshold)
- Compaction mode used (flatten or surgical)
- Any failures or escalations

**2. Signal completion:**
```bash
gc nudge deacon/ "DOG_DONE: compactor — compacted <count> databases, mode: {{mode}}"
```

**3. Close work and exit:**
```bash
bd close <work-bead> --reason "Compaction cycle complete"
gc runtime drain-ack
exit
```

**Exit criteria:** Report sent, dog returned to kennel."""
